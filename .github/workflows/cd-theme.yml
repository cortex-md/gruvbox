name: Theme CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Cortex CLI
        run: |
          bun add -g @cortex.md/cli
          cortex -v

      - name: Prepare release artifacts
        run: cortex theme publish .

      - name: Resolve release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST="dist/cortex-build/build.json"
          EXPECTED_TAG="$(jq -r ".tagName" "$MANIFEST")"

          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version tag ${EXPECTED_TAG}"
            exit 1
          fi

          echo "Release tag: ${EXPECTED_TAG}"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${EXPECTED_TAG}" >/dev/null; then
            TAG_SHA="$(git rev-list -n 1 "${EXPECTED_TAG}")"
            HEAD_SHA="$(git rev-parse HEAD)"
            if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
              if gh release view "$EXPECTED_TAG" >/dev/null 2>&1; then
                echo "Tag ${EXPECTED_TAG} already has a release and points at ${TAG_SHA}."
                echo "Bump manifest.version before publishing a new release."
                exit 1
              fi
              echo "Tag ${EXPECTED_TAG} already exists without a release; publishing release assets for it."
            fi
          else
            git tag "$EXPECTED_TAG"
            git push origin "refs/tags/${EXPECTED_TAG}"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MANIFEST="dist/cortex-build/build.json"
          TAG="$(jq -r ".tagName" "$MANIFEST")"
          TITLE="$(jq -r ".releaseName" "$MANIFEST")"
          NOTES="$(jq -r ".releaseNotes" "$MANIFEST")"
          NOTES_PATH="dist/cortex-build/$NOTES"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file "$NOTES_PATH" --latest
            gh release upload "$TAG" dist/cortex-build/assets/* --clobber
          else
            gh release create "$TAG" dist/cortex-build/assets/* --title "$TITLE" --notes-file "$NOTES_PATH" --latest
          fi
